<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全密码生成器</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23667eea'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle'%3E🔐%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: all 0.3s ease;
        }
        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4">
    <div class="w-full max-w-md mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-12 h-12 bg-gradient-to-br from-purple-100 to-purple-200 rounded-xl flex items-center justify-center">
                <span class="text-2xl">🔐</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">安全密码生成器</h1>
        </div>
        
        <div class="relative mb-6">
            <input 
                type="text" 
                id="password" 
                readonly 
                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 pr-24 text-gray-800 text-lg font-mono tracking-wider focus:outline-none focus:ring-2 focus:ring-purple-500"
                placeholder="点击生成密码"
            >
            <button 
                id="copyBtn" 
                class="absolute right-2 top-1/2 -translate-y-1/2 gradient-btn text-white px-4 py-1.5 rounded-md transition-all duration-200 text-sm font-medium"
            >
                复制
            </button>
        </div>
        
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-600 text-sm">密码强度</span>
                <span id="strengthText" class="text-sm font-medium">未生成</span>
            </div>
            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div id="strengthBar" class="h-full w-0 transition-all duration-300 rounded-full"></div>
            </div>
        </div>
        
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <label for="length" class="text-gray-600 text-sm">密码长度</label>
                <div class="flex items-center space-x-2">
                    <input 
                        type="number" 
                        id="lengthNumber" 
                        min="4" 
                        max="64" 
                        value="8"
                        class="w-16 bg-gray-50 border border-gray-200 rounded px-2 py-1 text-purple-600 font-medium text-center focus:outline-none focus:ring-2 focus:ring-purple-500"
                    >
                    <span class="text-gray-400 text-sm">位</span>
                </div>
            </div>
            <input 
                type="range" 
                id="length" 
                min="4" 
                max="64" 
                value="8" 
                class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-purple-600"
            >
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-600 text-sm mb-3">字符类型</label>
            <div class="grid grid-cols-2 gap-3">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="uppercase" checked class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">大写字母</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="lowercase" checked class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">小写字母</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="numbers" checked class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">数字</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="commonsymbols" checked class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">普通符号</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="symbols" class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">特殊符号</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="excludeSimilar" checked class="w-4 h-4 rounded accent-purple-600">
                    <span class="text-gray-700 text-sm">排除相似字符</span>
                </label>
            </div>
        </div>
        
        <div class="mb-6">
            <label for="accountInfo" class="block text-gray-600 text-sm mb-2">其他信息（将整合到二维码中）</label>
            <textarea 
                id="accountInfo" 
                rows="3" 
                class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-gray-700 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none"
                placeholder="格式示例：&#10;账号: example@email.com&#10;URL: https://www.example.com&#10;&#10;或直接输入其他信息"
            ></textarea>
            <p class="text-gray-400 text-xs mt-1">支持多行输入，用于扫码快速获取相关信息</p>
        </div>
        
        <div class="mb-6 flex justify-center">
            <div id="qrcode" class="bg-gray-100 p-2 rounded-lg"></div>
        </div>
        
        <button 
            id="generateBtn" 
            class="w-full gradient-btn text-white font-bold py-3 px-6 rounded-lg transition-all duration-200"
        >
            生成新密码
        </button>
        
        <p id="message" class="text-center mt-4 text-sm text-gray-500 opacity-0 transition-opacity duration-300"></p>
    </div>

    <script>
        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            commonsymbols: '_-.',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };
        
        const similarChars = '0Ool1I';
        
        const passwordEl = document.getElementById('password');
        const copyBtn = document.getElementById('copyBtn');
        const generateBtn = document.getElementById('generateBtn');
        const lengthEl = document.getElementById('length');
        const lengthNumberEl = document.getElementById('lengthNumber');
        const strengthBarEl = document.getElementById('strengthBar');
        const strengthTextEl = document.getElementById('strengthText');
        const messageEl = document.getElementById('message');
        const qrcodeEl = document.getElementById('qrcode');
        const accountInfoEl = document.getElementById('accountInfo');
        
        lengthEl.addEventListener('input', () => {
            lengthNumberEl.value = lengthEl.value;
            generatePassword();
        });
        
        lengthNumberEl.addEventListener('input', () => {
            let value = parseInt(lengthNumberEl.value);
            if (isNaN(value)) value = 8;
            value = Math.max(4, Math.min(64, value));
            lengthNumberEl.value = value;
            lengthEl.value = value;
            generatePassword();
        });
        
        accountInfoEl.addEventListener('input', () => {
            updateQRCodeWithAccountInfo(passwordEl.value);
        });
        
        generateBtn.addEventListener('click', generatePassword);
        
        copyBtn.addEventListener('click', async () => {
            const password = passwordEl.value;
            if (!password) return;
            
            try {
                await navigator.clipboard.writeText(password);
                showMessage('密码已复制到剪贴板！', 'text-green-500');
            } catch (err) {
                passwordEl.select();
                document.execCommand('copy');
                showMessage('密码已复制到剪贴板！', 'text-green-500');
            }
        });
        
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', generatePassword);
        });
        
        function generatePassword() {
            const length = parseInt(lengthEl.value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useCommonSymbols = document.getElementById('commonsymbols').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            
            let availableChars = '';
            if (useUppercase) availableChars += charSets.uppercase;
            if (useLowercase) availableChars += charSets.lowercase;
            if (useNumbers) availableChars += charSets.numbers;
            if (useCommonSymbols) availableChars += charSets.commonsymbols;
            if (useSymbols) availableChars += charSets.symbols;
            
            if (excludeSimilar) {
                availableChars = availableChars.split('').filter(c => !similarChars.includes(c)).join('');
            }
            
            if (availableChars.length === 0) {
                passwordEl.value = '';
                updateStrengthIndicator(0);
                updateQRCodeWithAccountInfo('');
                showMessage('请至少选择一种字符类型！', 'text-red-500');
                return;
            }
            
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += availableChars[array[i] % availableChars.length];
            }
            
            let guaranteedChars = '';
            if (useUppercase) guaranteedChars += getRandomChar(charSets.uppercase, excludeSimilar);
            if (useLowercase) guaranteedChars += getRandomChar(charSets.lowercase, excludeSimilar);
            if (useNumbers) guaranteedChars += getRandomChar(charSets.numbers, excludeSimilar);
            if (useCommonSymbols) guaranteedChars += getRandomChar(charSets.commonsymbols, excludeSimilar);
            if (useSymbols) guaranteedChars += getRandomChar(charSets.symbols, excludeSimilar);
            
            password = guaranteedChars + password.slice(guaranteedChars.length);
            password = shuffleString(password);
            
            passwordEl.value = password;
            updateStrengthIndicator(calculateStrength(password));
            updateQRCodeWithAccountInfo(password);
        }
        
        function getRandomChar(charSet, excludeSimilar) {
            let filteredSet = charSet;
            if (excludeSimilar) {
                filteredSet = filteredSet.split('').filter(c => !similarChars.includes(c)).join('');
            }
            const array = new Uint32Array(1);
            crypto.getRandomValues(array);
            return filteredSet[array[0] % filteredSet.length];
        }
        
        function shuffleString(str) {
            const array = str.split('');
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] / (0xFFFFFFFF / (i + 1)));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array.join('');
        }
        
        function calculateStrength(password) {
            if (!password) return 0;
            
            let score = 0;
            
            if (password.length >= 4) score += 1;
            if (password.length >= 8) score += 1;
            if (password.length >= 12) score += 1;
            if (password.length >= 16) score += 1;
            if (password.length >= 24) score += 1;
            
            if (/[a-z]/.test(password)) score += 1;
            if (/[A-Z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^a-zA-Z0-9]/.test(password)) score += 1;
            
            return score;
        }
        
        function updateStrengthIndicator(score) {
            const strengthLevels = [
                { text: '极弱', color: 'bg-red-500', width: '20%' },
                { text: '弱', color: 'bg-orange-500', width: '40%' },
                { text: '中等', color: 'bg-yellow-500', width: '60%' },
                { text: '强', color: 'bg-green-500', width: '80%' },
                { text: '极强', color: 'bg-emerald-500', width: '100%' }
            ];
            
            const level = strengthLevels[Math.min(score, strengthLevels.length - 1)];
            
            strengthBarEl.className = `h-full transition-all duration-300 rounded-full ${level.color}`;
            strengthBarEl.style.width = level.width;
            strengthTextEl.textContent = level.text;
            strengthTextEl.className = `text-sm font-medium ${level.color.replace('bg-', 'text-')}`;
        }
        
        function updateQRCodeWithAccountInfo(password) {
            qrcodeEl.innerHTML = '';
            
            const accountInfo = accountInfoEl.value.trim();
            
            let qrContent = '';
            if (password) {
                qrContent = password;
            }
            
            if (accountInfo) {
                if (qrContent) {
                    qrContent += '\n\n' + accountInfo;
                } else {
                    qrContent = accountInfo;
                }
            }
            
            if (!qrContent) return;
            
            QRCode.toCanvas(qrContent, {
                width: 150,
                margin: 1,
                color: {
                    dark: '#667eea',
                    light: '#ffffff'
                }
            }, function(error, canvas) {
                if (error) {
                    console.error(error);
                    return;
                }
                qrcodeEl.appendChild(canvas);
            });
        }
        
        function showMessage(text, colorClass) {
            messageEl.textContent = text;
            messageEl.className = `text-center mt-4 text-sm ${colorClass} opacity-100 transition-opacity duration-300`;
            
            setTimeout(() => {
                messageEl.classList.remove('opacity-100');
                messageEl.classList.add('opacity-0');
            }, 2000);
        }
        
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>
